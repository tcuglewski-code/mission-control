# Dependabot configuration file
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm (package.json, package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "automated"
    groups:
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
    # Auto-merge patch updates via GitHub Actions workflow
    # Requires separate workflow: .github/workflows/dependabot-automerge.yml

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "automated"
