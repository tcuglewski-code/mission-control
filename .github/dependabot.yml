# Dependabot configuration file
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm (package.json, package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "automated"
    # ONLY auto-merge patch updates — minor/major need manual review
    # Major version bumps often have breaking changes (react-markdown 9→10!)
    groups:
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
    ignore:
      # Block all major version auto-updates — must be reviewed manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — only patch/minor
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "automated"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
